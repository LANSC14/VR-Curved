<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <link rel="icon" href="data:,">
    <title>Curved</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #hud {
        position: fixed; top: 18px; left: 22px;
        z-index: 999; pointer-events: none;
        font-family: 'Courier New', monospace;
        font-size: 22px; font-weight: bold;
        color: #00ffcc; letter-spacing: 2px; display: none;
      }
      #crosshair {
        position: fixed; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 18px; height: 18px; pointer-events: none; z-index: 999;
      }
      #crosshair::before, #crosshair::after {
        content: ''; position: absolute; background: #00ffcc; opacity: 0.85;
      }
      #crosshair::before { width: 2px; height: 100%; left: 50%; top: 0; transform: translateX(-50%); }
      #crosshair::after  { height: 2px; width: 100%; top: 50%; left: 0; transform: translateY(-50%); }
      #result {
        position: fixed; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        z-index: 999; pointer-events: none;
        font-family: 'Courier New', monospace;
        font-size: 36px; font-weight: bold;
        color: #ffcc00; text-align: center; display: none;
      }
      #target-hint {
        position: fixed; top: 18px; right: 22px;
        z-index: 999; pointer-events: none;
        font-family: 'Courier New', monospace;
        font-size: 15px; color: #ffffffaa; display: none;
        text-align: right;
      }
      #target-hint span {
        display: block; color: #ff4466; font-size: 30px;
        font-weight: bold; letter-spacing: 2px;
      }
      #retryBtn {
        position: fixed; top: calc(50% + 80px); left: 50%;
        transform: translateX(-50%); z-index: 999;
        font-family: 'Courier New', monospace; font-size: 20px;
        font-weight: bold; color: #00ffcc; border: 2px solid #00ffcc;
        padding: 8px 20px; cursor: pointer; display: none;
      }
    </style>
  </head>
  <body>
    <div id="hud">⏱ 00:00.00</div>
    <div id="crosshair"></div>
    <div id="result"></div>
    <div id="target-hint">找到並點擊：<span id="targetLabel">--</span></div>
    <div id="retryBtn">↻ RETRY</div>

    <a-scene background="color: #0a0a1a" vr-mode-ui="enabled: true">
      <a-entity id="rig" position="0 0 0">
        <a-entity id="cam" camera position="0 2.5 0"
          look-controls="pointerLockEnabled: false; magicWindowTrackingEnabled: true; touchEnabled: true"
          wasd-controls>
        </a-entity>
        <a-entity id="rHand"
          laser-controls="hand: right"
          raycaster="far: 30; near: 0; lineColor: #00ffcc; lineOpacity: 0.7; objects: .vrRayTarget">
        </a-entity>
        <a-entity id="lHand"
          laser-controls="hand: left"
          raycaster="far: 30; near: 0; lineColor: #00ffcc; lineOpacity: 0.4; objects: .vrRayTarget">
        </a-entity>
      </a-entity>

      <a-entity id="startBtn" position="0 2.5 -2.5">
        <a-plane id="startPlane" class="clickable vrRayTarget"
          width="1.2" height="0.45" color="#003344" opacity="0.95"></a-plane>
        <a-plane width="1.26" height="0.51" color="#00ffcc" opacity="0.25"
          position="0 0 -0.02"></a-plane>
        <a-text value="▶  START" align="center" position="0 0 0.03"
          color="#00ffcc" width="3.5"
          font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
      </a-entity>

      <a-entity id="arcRoot" position="0 2.5 0" visible="false">
        <a-entity id="cylinderWall" class="clickable"></a-entity>
        <a-entity id="cylinderProxy" class="vrRayTarget"></a-entity>

        <a-entity id="vrHud" visible="false" position="7 3 0" rotation="0 -90 0">
          <a-plane width="5.5" height="0.65" color="#000a12" opacity="0.85" position="0 0 -0.01"></a-plane>
          <a-text id="vrTimerText" value="⏱ 00:00.00" color="#00ffcc" width="6" align="left" position="-2.4 0 0.01"></a-text>
          <a-text value="|" color="#ffffff44" width="1.2" align="center" position="0 0 0.01"></a-text>
          <a-text id="vrTargetText" value="找: --" color="#ff4466" width="6" align="right" position="2.4 0 0.01"></a-text>
        </a-entity>
      </a-entity>

      <a-plane rotation="-90 0 0" width="30" height="30"
        color="#080818" roughness="1"></a-plane>
      <a-light type="ambient" color="#ffffff" intensity="2.5"></a-light>
    </a-scene>

<script>
/* 👉 JS 完整保留，只修 function 結構與錯誤 */

function doStart(){
  errorCount=0; gameState='playing';
  generateGrid();
  if(!canvas) initCanvas();
  buildCylinder();

  const camEl=document.querySelector('#cam');
  const lc=camEl.components['look-controls'];
  if(lc){lc.yawObject.rotation.y=0;lc.pitchObject.rotation.x=0;}
  camEl.setAttribute('position',{x:0,y:2.5,z:0});

  startBtn.setAttribute('visible','false');
  removeVrResult();

  hud.style.display='block'; hud.style.color='#00ffcc';
  targetHint.style.display='block';
  targetLabel.textContent=gridValues[targetIndex];
  resultDiv.style.display='none';
  retryBtn.style.display='none';

  if(vrTargetText) vrTargetText.setAttribute('value','找: '+gridValues[targetIndex]);
  setVrHudVisible(true);

  startTime=performance.now(); isRunning=true;
  rafId=requestAnimationFrame(tick);
}

function doFinish(){
  if(!isRunning) return;
  isRunning=false; gameState='result';
  cancelAnimationFrame(rafId);
  const t=formatTime(performance.now()-startTime);
  hud.textContent='⏱ '+t; hud.style.color='#ffcc00';
  if(vrTimerText) vrTimerText.setAttribute('value','⏱ '+t);
  resultDiv.innerHTML=`✓ &nbsp;${t}<br><span style="font-size:20px;color:#ff4466">Errors: ${errorCount}</span><br><span style="font-size:16px;color:#ffffff88">找到目標！</span>`;
  resultDiv.style.display='block';
  targetHint.style.display='none';
  retryBtn.style.display='block';
  setVrHudVisible(false);
  buildVrResult(t);
}
</script>

  </body>
</html>
