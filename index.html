<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <link rel="icon" href="data:,">
    <title>Curved</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #hud {
        position: fixed; top: 18px; left: 22px;
        z-index: 999; pointer-events: none;
        font-family: 'Courier New', monospace;
        font-size: 22px; font-weight: bold;
        color: #00ffcc; letter-spacing: 2px; display: none;
      }
      #crosshair {
        position: fixed; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 18px; height: 18px; pointer-events: none; z-index: 999;
      }
      #crosshair::before, #crosshair::after {
        content: ''; position: absolute; background: #00ffcc; opacity: 0.85;
      }
      #crosshair::before { width: 2px; height: 100%; left: 50%; top: 0; transform: translateX(-50%); }
      #crosshair::after  { height: 2px; width: 100%; top: 50%; left: 0; transform: translateY(-50%); }
      #result {
        position: fixed; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        z-index: 999; pointer-events: none;
        font-family: 'Courier New', monospace;
        font-size: 36px; font-weight: bold;
        color: #ffcc00; text-align: center; display: none;
      }
      #target-hint {
        position: fixed; top: 18px; right: 22px;
        z-index: 999; pointer-events: none;
        font-family: 'Courier New', monospace;
        font-size: 15px; color: #ffffffaa; display: none;
        text-align: right;
      }
      #target-hint span {
        display: block; color: #ff4466; font-size: 30px;
        font-weight: bold; letter-spacing: 2px;
      }
      #retryBtn {
        position: fixed; top: calc(50% + 80px); left: 50%;
        transform: translateX(-50%); z-index: 999;
        font-family: 'Courier New', monospace; font-size: 20px;
        font-weight: bold; color: #00ffcc; border: 2px solid #00ffcc;
        padding: 8px 20px; cursor: pointer; display: none;
      }
    </style>
  </head>
  <body>
    <div id="hud">⏱ 00:00.00</div>
    <div id="crosshair"></div>
    <div id="result"></div>
    <div id="target-hint">找到並點擊：<span id="targetLabel">--</span></div>
    <div id="retryBtn">↻ RETRY</div>

    <a-scene background="color: #0a0a1a" vr-mode-ui="enabled: true">
      <a-entity id="rig" position="0 0 0">
        <a-entity id="cam" camera position="0 2.5 0"
          look-controls="pointerLockEnabled: false; magicWindowTrackingEnabled: true; touchEnabled: true"
          wasd-controls>

          <!-- ✅ 修正：VR HUD 位置 -->
          <a-entity id="vrHud" visible="false" position="0 0.2 -1.2" scale="1 1 1">
            <a-text id="vrTimerText" value="⏱ 00:00.00" color="#00ffcc" width="2.5" align="right" position="-0.3 0 0"></a-text>
            <a-text value="|" color="#ffffff33" width="0.6" align="center" position="0 0 0"></a-text>
            <a-text id="vrTargetText" value="找: --" color="#ff4466" width="2.5" align="left" position="0.3 0 0"></a-text>
          </a-entity>

        </a-entity>

        <!-- ✅ 修正：raycaster 移除 objects 限制 -->
        <a-entity id="rHand"
          laser-controls="hand: right"
          raycaster="far: 30; near: 0; lineColor: #00ffcc; lineOpacity: 0.7">
        </a-entity>
        <a-entity id="lHand"
          laser-controls="hand: left"
          raycaster="far: 30; near: 0; lineColor: #00ffcc; lineOpacity: 0.4">
        </a-entity>
      </a-entity>

      <a-entity id="startBtn" position="0 2.5 -2.5">
        <a-plane id="startPlane" class="clickable"
          width="1.2" height="0.45" color="#003344" opacity="0.95"></a-plane>
        <a-plane width="1.26" height="0.51" color="#00ffcc" opacity="0.25"
          position="0 0 -0.02"></a-plane>
        <a-text value="▶  START" align="center" position="0 0 0.03"
          color="#00ffcc" width="3.5"
          font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
      </a-entity>

      <a-entity id="arcRoot" position="0 2.5 0" visible="false">
        <a-entity id="cylinderWall" class="clickable"></a-entity>
      </a-entity>

      <a-plane rotation="-90 0 0" width="30" height="30"
        color="#080818" roughness="1"></a-plane>
      <a-light type="ambient" color="#ffffff" intensity="2.5"></a-light>
    </a-scene>

<script>
const ROWS=7, COLS=10, RADIUS=8, ARC_DEG=140, WALL_H=5, TEX_W=4096, TEX_H=1024;

let gridValues=[], targetIndex=-1, cellData=[];
let cylinderMesh=null, canvasTex=null, canvas, ctx;
let errorCount=0, startTime=0, isRunning=false, rafId=null;
let gameState='idle';
let vrRetryMesh=null, vrResultPanel=null;
let vrTimerText=null, vrTargetText=null;

const hud=document.getElementById('hud');
const resultDiv=document.getElementById('result');
const targetHint=document.getElementById('target-hint');
const targetLabel=document.getElementById('targetLabel');
const retryBtn=document.getElementById('retryBtn');
const startBtn=document.querySelector('#startBtn');
const arcRoot=document.querySelector('#arcRoot');
const cylinderWallEl=document.querySelector('#cylinderWall');
const vrHud=document.getElementById('vrHud');

function initCanvas(){
  canvas=document.createElement('canvas');
  canvas.width=TEX_W; canvas.height=TEX_H;
  ctx=canvas.getContext('2d');
}

function generateGrid(){
  gridValues=[];
  for(let i=0;i<ROWS*COLS;i++) gridValues.push((Math.random()*99.999).toFixed(2));
  targetIndex=Math.floor(Math.random()*ROWS*COLS);
}

function drawTexture(){
  ctx.fillStyle='#040412'; ctx.fillRect(0,0,TEX_W,TEX_H);
  ctx.strokeStyle='#112233'; ctx.lineWidth=2;
  for(let c=1;c<COLS;c++){const x=c*(TEX_W/COLS);ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,TEX_H);ctx.stroke();}
  for(let r=1;r<ROWS;r++){const y=r*(TEX_H/ROWS);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(TEX_W,y);ctx.stroke();}
  cellData=[];
  const cW=TEX_W/COLS, cH=TEX_H/ROWS;
  for(let row=0;row<ROWS;row++){
    for(let col=0;col<COLS;col++){
      const idx=row*COLS+col, cx=(col+.5)*cW, cy=(row+.5)*cH;
      ctx.save(); ctx.translate(cx,cy); ctx.scale(-1,1); ctx.translate(-cx,-cy);
      ctx.font='bold 115px "Courier New",monospace';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle='#00eebb';
      ctx.fillText(gridValues[idx],cx,cy);
      ctx.restore();
      cellData.push({index:idx,uMin:col/COLS,uMax:(col+1)/COLS,vMin:row/ROWS,vMax:(row+1)/ROWS});
    }
  }
  if(canvasTex) canvasTex.needsUpdate=true;
}

function buildCylinder(){
  if(cylinderMesh){
    cylinderWallEl.object3D.remove(cylinderMesh);
    cylinderMesh.geometry.dispose();
    cylinderMesh.material.dispose();
    cylinderMesh=null;
  }
  const arcRad=THREE.MathUtils.degToRad(ARC_DEG), ts=Math.PI/2-arcRad/2;
  const geo=new THREE.CylinderGeometry(RADIUS,RADIUS,WALL_H,COLS*16,1,true,ts,arcRad);

  // ✅ 刪掉反轉三角形（Quest點擊BUG來源）

  const tex=new THREE.CanvasTexture(canvas);
  tex.needsUpdate=true;

  cylinderMesh=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({map:tex}));
  cylinderWallEl.object3D.add(cylinderMesh);
  arcRoot.setAttribute('visible','true');
  drawTexture();
}

function doStart(){
  generateGrid();
  if(!canvas) initCanvas();
  buildCylinder();
  startBtn.setAttribute('visible','false');
  vrHud.setAttribute('visible','true');
}

document.querySelector('a-scene').addEventListener('loaded', ()=>{
  ['rHand','lHand'].forEach(id=>{
    const hand=document.getElementById(id);

    function onClick(){
      const raycasterComp=hand.components.raycaster;
      if(!raycasterComp) return;
      const intersections=raycasterComp.intersections;
      if(!intersections.length) return;
      console.log("CLICKED"); // debug
    }

    hand.addEventListener('triggerdown', onClick);
    hand.addEventListener('selectstart', onClick); // ✅ 新增
  });
});
</script>
  </body>
</html>
