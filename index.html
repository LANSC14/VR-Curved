<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <link rel="icon" href="data:,">
    <title>Curved</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #hud {
        position: fixed; top: 18px; left: 22px;
        z-index: 999; pointer-events: none;
        font-family: 'Courier New', monospace;
        font-size: 22px; font-weight: bold;
        color: #00ffcc; letter-spacing: 2px; display: none;
      }
      #crosshair {
        position: fixed; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 18px; height: 18px; pointer-events: none; z-index: 999;
      }
      #crosshair::before, #crosshair::after {
        content: ''; position: absolute; background: #00ffcc; opacity: 0.85;
      }
      #crosshair::before { width: 2px; height: 100%; left: 50%; top: 0; transform: translateX(-50%); }
      #crosshair::after  { height: 2px; width: 100%; top: 50%; left: 0; transform: translateY(-50%); }
      #result {
        position: fixed; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        z-index: 999; pointer-events: none;
        font-family: 'Courier New', monospace;
        font-size: 36px; font-weight: bold;
        color: #ffcc00; text-align: center; display: none;
      }
      #target-hint {
        position: fixed; top: 18px; right: 22px;
        z-index: 999; pointer-events: none;
        font-family: 'Courier New', monospace;
        font-size: 15px; color: #ffffffaa; display: none;
        text-align: right;
      }
      #target-hint span {
        display: block; color: #ff4466; font-size: 30px;
        font-weight: bold; letter-spacing: 2px;
      }
      #retryBtn {
        position: fixed; top: calc(50% + 80px); left: 50%;
        transform: translateX(-50%); z-index: 999;
        font-family: 'Courier New', monospace; font-size: 20px;
        font-weight: bold; color: #00ffcc; border: 2px solid #00ffcc;
        padding: 8px 20px; cursor: pointer; display: none;
      }
    </style>
  </head>
  <body>
    <div id="hud">⏱ 00:00.00</div>
    <div id="crosshair"></div>
    <div id="result"></div>
    <div id="target-hint">找到並點擊：<span id="targetLabel">--</span></div>
    <div id="retryBtn">↻ RETRY</div>

    <!-- FIX 1: vr-mode-ui="enterVRButton: #enterVR" 讓 WebXR 正確啟用 -->
    <!-- FIX 2: 移除 renderer 設定，讓 A-Frame 自動選最佳 -->
    <a-scene background="color: #0a0a1a" vr-mode-ui="enabled: true">
      <a-entity id="rig" position="0 0 0">
        <!-- FIX 3: look-controls 在 VR 模式用頭部追蹤，不需要 pointerLockEnabled -->
        <!-- magicWindowTrackingEnabled:true 讓手機/HMD 頭部追蹤正常 -->
        <a-entity id="cam" camera position="0 2.5 0"
          look-controls="pointerLockEnabled: false; magicWindowTrackingEnabled: true; touchEnabled: true"
          wasd-controls>
        </a-entity>

        <!-- FIX 4: oculus-touch-controls 改用 laser-controls 並加正確 raycaster -->
        <!-- near:0 確保近距離也能射線偵測 -->
        <a-entity id="rHand"
          laser-controls="hand: right"
          raycaster="objects: .clickable; far: 30; near: 0; lineColor: #00ffcc; lineOpacity: 0.7">
        </a-entity>
        <a-entity id="lHand"
          laser-controls="hand: left"
          raycaster="objects: .clickable; far: 30; near: 0; lineColor: #00ffcc; lineOpacity: 0.4">
        </a-entity>
      </a-entity>

      <a-entity id="startBtn" position="0 1.6 -2.5">
        <a-plane id="startPlane" class="clickable"
          width="1.2" height="0.45" color="#003344" opacity="0.95"></a-plane>
        <a-plane width="1.26" height="0.51" color="#00ffcc" opacity="0.25"
          position="0 0 -0.02"></a-plane>
        <a-text value="▶  START" align="center" position="0 0 0.03"
          color="#00ffcc" width="3.5"
          font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
      </a-entity>

      <!-- FIX 5: cylinderWall 是獨立 entity，class=clickable 讓 VR controller 射線可直接偵測 -->
      <a-entity id="arcRoot" position="0 2.5 0" visible="false">
        <a-entity id="cylinderWall" class="clickable"></a-entity>
      </a-entity>

      <a-plane rotation="-90 0 0" width="30" height="30"
        color="#080818" roughness="1"></a-plane>
      <a-light type="ambient" color="#ffffff" intensity="2.5"></a-light>
    </a-scene>

    <script>
    const ROWS=7, COLS=10, RADIUS=8, ARC_DEG=200, WALL_H=5, TEX_W=8192, TEX_H=2048;

    let gridValues=[], targetIndex=-1, cellData=[];
    let cylinderMesh=null, canvasTex=null, canvas, ctx;
    let errorCount=0, startTime=0, isRunning=false, rafId=null;
    let gameState='idle';
    let vrRetryMesh=null, vrResultPanel=null;
    let vrHintEl=null, vrTimerEl=null;

    const hud=document.getElementById('hud');
    const resultDiv=document.getElementById('result');
    const targetHint=document.getElementById('target-hint');
    const targetLabel=document.getElementById('targetLabel');
    const retryBtn=document.getElementById('retryBtn');
    const startBtn=document.querySelector('#startBtn');
    const arcRoot=document.querySelector('#arcRoot');
    const cylinderWallEl=document.querySelector('#cylinderWall');

    function initCanvas(){
      canvas=document.createElement('canvas');
      canvas.width=TEX_W; canvas.height=TEX_H;
      ctx=canvas.getContext('2d');
    }

    function generateGrid(){
      gridValues=[];
      for(let i=0;i<ROWS*COLS;i++) gridValues.push((Math.random()*99.999).toFixed(2));
      targetIndex=Math.floor(Math.random()*ROWS*COLS);
    }

    function drawTexture(){
      ctx.fillStyle='#040412'; ctx.fillRect(0,0,TEX_W,TEX_H);
      ctx.strokeStyle='#112233'; ctx.lineWidth=2;
      for(let c=1;c<COLS;c++){const x=c*(TEX_W/COLS);ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,TEX_H);ctx.stroke();}
      for(let r=1;r<ROWS;r++){const y=r*(TEX_H/ROWS);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(TEX_W,y);ctx.stroke();}
      cellData=[];
      const cW=TEX_W/COLS, cH=TEX_H/ROWS;
      for(let row=0;row<ROWS;row++){
        for(let col=0;col<COLS;col++){
          const idx=row*COLS+col, cx=(col+.5)*cW, cy=(row+.5)*cH;
          ctx.save(); ctx.translate(cx,cy); ctx.scale(-1,1); ctx.translate(-cx,-cy);
          ctx.font='bold 115px "Courier New",monospace';
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillStyle='#00eebb'; ctx.shadowColor='#00eebb66'; ctx.shadowBlur=12;
          ctx.fillText(gridValues[idx],cx,cy); ctx.shadowBlur=0; ctx.restore();
          cellData.push({index:idx,uMin:col/COLS,uMax:(col+1)/COLS,vMin:row/ROWS,vMax:(row+1)/ROWS});
        }
      }
      const g=ctx.createLinearGradient(0,0,0,TEX_H);
      g.addColorStop(0,'rgba(0,200,180,0.08)'); g.addColorStop(.5,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,200,180,0.08)');
      ctx.fillStyle=g; ctx.fillRect(0,0,TEX_W,TEX_H);
      if(canvasTex) canvasTex.needsUpdate=true;
    }

    function buildCylinder(){
      // 移除舊 mesh
      if(cylinderMesh){
        cylinderWallEl.object3D.remove(cylinderMesh);
        cylinderMesh.geometry.dispose();
        cylinderMesh.material.dispose();
        cylinderMesh=null;
      }
      const arcRad=THREE.MathUtils.degToRad(ARC_DEG), ts=Math.PI/2-arcRad/2;
      const geo=new THREE.CylinderGeometry(RADIUS,RADIUS,WALL_H,COLS*16,1,true,ts,arcRad);
      const ix=geo.index.array;
      for(let i=0;i<ix.length;i+=3){const t=ix[i+1];ix[i+1]=ix[i+2];ix[i+2]=t;}
      geo.index.needsUpdate=true; geo.computeVertexNormals();
      canvasTex=new THREE.CanvasTexture(canvas);
      canvasTex.wrapS=canvasTex.wrapT=THREE.ClampToEdgeWrapping;
      canvasTex.minFilter=canvasTex.magFilter=THREE.LinearFilter;
      canvasTex.anisotropy=8;
      cylinderMesh=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({map:canvasTex,side:THREE.FrontSide}));

      // FIX 6: 把 mesh 掛在 cylinderWallEl.object3D，讓 a-entity class=clickable 生效
      cylinderWallEl.object3D.add(cylinderMesh);

      arcRoot.setAttribute('rotation','0 100 0');
      arcRoot.setAttribute('visible','true');
      drawTexture();
    }

    // ── VR HUD ──────────────────────────────────────────────────
    // FIX 7: VR HUD 改掛在世界空間 (a-scene 直接子元素)，跟著 rig 位置
    // 不掛在 cam 下，避免在 WebXR 模式坐標系混亂
    // 用 billboard component 讓它永遠面向玩家

    // 自訂 billboard component：每幀讓 entity 面向相機
    AFRAME.registerComponent('billboard', {
      tick: function () {
        const cam = document.querySelector('#cam');
        if (!cam || !cam.object3D) return;
        // 取得世界位置
        const camWorldPos = new THREE.Vector3();
        cam.object3D.getWorldPosition(camWorldPos);
        this.el.object3D.lookAt(camWorldPos);
      }
    });

    function buildVrHud(){
      if(vrHintEl) return;

      // 計時器 entity（固定在世界，跟 rig 一起）
      vrTimerEl=document.createElement('a-text');
      vrTimerEl.setAttribute('id','vrTimerText');
      vrTimerEl.setAttribute('value','⏱ 00:00.00');
      vrTimerEl.setAttribute('color','#00ffcc');
      vrTimerEl.setAttribute('width','3');
      vrTimerEl.setAttribute('align','left');
      vrTimerEl.setAttribute('position','0 2.5 0'); // 相對 rig 偏移，下面動態更新
      vrTimerEl.setAttribute('visible','false');
      // 掛在 rig 下方便跟著移動
      document.querySelector('#rig').appendChild(vrTimerEl);

      // 目標提示 entity
      vrHintEl=document.createElement('a-entity');
      vrHintEl.setAttribute('id','vrHintRoot');
      vrHintEl.setAttribute('position','0 2.5 0');
      vrHintEl.setAttribute('visible','false');

      const hLabel=document.createElement('a-text');
      hLabel.setAttribute('value','找到並點擊');
      hLabel.setAttribute('align','right'); hLabel.setAttribute('color','#ffffff88');
      hLabel.setAttribute('width','2.2'); hLabel.setAttribute('position','0 0.15 0');
      vrHintEl.appendChild(hLabel);

      const hTxt=document.createElement('a-text');
      hTxt.setAttribute('id','vrTargetText');
      hTxt.setAttribute('value','--');
      hTxt.setAttribute('align','right'); hTxt.setAttribute('color','#ff4466');
      hTxt.setAttribute('width','3.2'); hTxt.setAttribute('position','0 -0.05 0');
      vrHintEl.appendChild(hTxt);

      document.querySelector('#rig').appendChild(vrHintEl);
    }

    // FIX 8: 每幀更新 VR HUD 位置，讓它出現在玩家視野前方
    function updateVrHudPosition(){
      if(!vrTimerEl&&!vrHintEl) return;
      const cam=document.querySelector('#cam');
      if(!cam||!cam.object3D) return;

      // 取得相機世界方向
      const dir=new THREE.Vector3(0,0,-1).applyQuaternion(cam.object3D.quaternion);
      const camPos=new THREE.Vector3();
      cam.object3D.getWorldPosition(camPos);

      // 計時器：左前方
      const timerPos=camPos.clone().add(dir.clone().multiplyScalar(2.5));
      const right=new THREE.Vector3(1,0,0).applyQuaternion(cam.object3D.quaternion);
      const up=new THREE.Vector3(0,1,0).applyQuaternion(cam.object3D.quaternion);
      const timerOffset=timerPos.clone()
        .add(right.clone().multiplyScalar(-0.8))
        .add(up.clone().multiplyScalar(0.4));
      const hintOffset=timerPos.clone()
        .add(right.clone().multiplyScalar(0.8))
        .add(up.clone().multiplyScalar(0.4));

      // 轉成相對 rig 座標
      const rig=document.querySelector('#rig');
      const rigPos=new THREE.Vector3();
      rig.object3D.getWorldPosition(rigPos);

      if(vrTimerEl){
        const lp=timerOffset.clone().sub(rigPos);
        vrTimerEl.setAttribute('position',`${lp.x} ${lp.y} ${lp.z}`);
        // 面向相機
        vrTimerEl.object3D.lookAt(camPos);
      }
      if(vrHintEl){
        const lp=hintOffset.clone().sub(rigPos);
        vrHintEl.setAttribute('position',`${lp.x} ${lp.y} ${lp.z}`);
        vrHintEl.object3D.lookAt(camPos);
      }
    }

    function setVrHudVisible(v){
      const s=v?'true':'false';
      if(vrHintEl) vrHintEl.setAttribute('visible',s);
      if(vrTimerEl) vrTimerEl.setAttribute('visible',s);
    }

    // ── VR 結算面板 ──────────────────────────────────────────────
    function buildVrResult(timeStr){
      removeVrResult();
      const cam=document.querySelector('#cam');
      const rig=document.querySelector('#rig');

      vrResultPanel=document.createElement('a-entity');
      vrResultPanel.setAttribute('id','vrResultPanel');

      // 定位在玩家前方 2.5m
      const dir=new THREE.Vector3(0,0,-1).applyQuaternion(cam.object3D.quaternion);
      dir.y=0; dir.normalize();
      const camPos=new THREE.Vector3();
      cam.object3D.getWorldPosition(camPos);
      const panelWorld=camPos.clone().add(dir.multiplyScalar(2.5));
      const rigPos=new THREE.Vector3();
      rig.object3D.getWorldPosition(rigPos);
      const panelLocal=panelWorld.clone().sub(rigPos);
      vrResultPanel.setAttribute('position',`${panelLocal.x} ${camPos.y-rigPos.y} ${panelLocal.z}`);
      // 面向玩家
      vrResultPanel.setAttribute('look-at','#cam');

      const bg=document.createElement('a-plane');
      bg.setAttribute('width','3'); bg.setAttribute('height','1.4');
      bg.setAttribute('color','#001122'); bg.setAttribute('opacity','0.93');
      vrResultPanel.appendChild(bg);

      const txt=document.createElement('a-text');
      txt.setAttribute('value',`✓  ${timeStr}\nErrors: ${errorCount}\n找到目標！`);
      txt.setAttribute('align','center'); txt.setAttribute('color','#ffcc00');
      txt.setAttribute('width','6'); txt.setAttribute('position','0 0.22 0.02');
      vrResultPanel.appendChild(txt);

      // FIX 9: vrRetryPlane 掛 class=clickable 確保 VR controller 能射線偵測
      const rp=document.createElement('a-plane');
      rp.setAttribute('id','vrRetryPlane');
      rp.setAttribute('class','clickable');
      rp.setAttribute('width','1.6'); rp.setAttribute('height','0.45');
      rp.setAttribute('color','#003344'); rp.setAttribute('opacity','0.95');
      rp.setAttribute('position','0 -0.52 0.01');
      vrResultPanel.appendChild(rp);

      const rtxt=document.createElement('a-text');
      rtxt.setAttribute('value','↻  RETRY');
      rtxt.setAttribute('align','center'); rtxt.setAttribute('color','#00ffcc');
      rtxt.setAttribute('width','4'); rtxt.setAttribute('position','0 -0.52 0.03');
      vrResultPanel.appendChild(rtxt);

      rig.appendChild(vrResultPanel);
      vrRetryMesh=rp;
    }

    function removeVrResult(){
      if(vrResultPanel&&vrResultPanel.parentNode) vrResultPanel.parentNode.removeChild(vrResultPanel);
      vrResultPanel=null; vrRetryMesh=null;
    }

    // ── 計時 ─────────────────────────────────────────────────────
    function formatTime(ms){
      return `${Math.floor(ms/60000).toString().padStart(2,'0')}:${Math.floor((ms%60000)/1000).toString().padStart(2,'0')}.${Math.floor((ms%1000)/10).toString().padStart(2,'0')}`;
    }

    function tick(){
      if(!isRunning) return;
      const t=formatTime(performance.now()-startTime);
      hud.textContent='⏱ '+t;
      if(vrTimerEl) vrTimerEl.setAttribute('value','⏱ '+t);
      updateVrHudPosition();
      rafId=requestAnimationFrame(tick);
    }

    // ── 遊戲流程 ─────────────────────────────────────────────────
    function doStart(){
      errorCount=0; gameState='playing';
      generateGrid();
      if(!canvas) initCanvas();
      buildCylinder();
      buildVrHud();

      const camEl=document.querySelector('#cam');
      const lc=camEl.components['look-controls'];
      if(lc){lc.yawObject.rotation.y=0;lc.pitchObject.rotation.x=0;}
      camEl.setAttribute('position',{x:0,y:2.5,z:0});

      startBtn.setAttribute('visible','false');
      removeVrResult();

      hud.style.display='block'; hud.style.color='#00ffcc';
      targetHint.style.display='block';
      targetLabel.textContent=gridValues[targetIndex];
      resultDiv.style.display='none';
      retryBtn.style.display='none';

      const vtt=document.getElementById('vrTargetText');
      if(vtt) vtt.setAttribute('value',gridValues[targetIndex]);
      setVrHudVisible(true);

      startTime=performance.now(); isRunning=true;
      rafId=requestAnimationFrame(tick);
    }

    function doFinish(){
      if(!isRunning) return;
      isRunning=false; gameState='result';
      cancelAnimationFrame(rafId);
      const t=formatTime(performance.now()-startTime);
      hud.textContent='⏱ '+t; hud.style.color='#ffcc00';
      resultDiv.innerHTML=`✓ &nbsp;${t}<br><span style="font-size:20px;color:#ff4466">Errors: ${errorCount}</span><br><span style="font-size:16px;color:#ffffff88">找到目標！</span>`;
      resultDiv.style.display='block';
      targetHint.style.display='none';
      retryBtn.style.display='block';
      setVrHudVisible(false);
      buildVrResult(t);
    }

    function doRetry(){
      gameState='idle';
      resultDiv.style.display='none';
      retryBtn.style.display='none';
      removeVrResult();
      doStart();
    }

    retryBtn.addEventListener('click', doRetry);

    // ── 統一射線處理 ──────────────────────────────────────────────
    document.querySelector('a-scene').addEventListener('loaded', ()=>{
      const camEl=document.querySelector('#cam');
      const rc=new THREE.Raycaster();
      const mouse=new THREE.Vector2();

      function getTargets(){
        const list=[];
        if(startBtn.object3D.visible){
          const sp=document.getElementById('startPlane');
          if(sp) sp.object3D.traverse(c=>{if(c.isMesh) list.push({mesh:c,type:'start'});});
        }
        if(gameState==='playing'&&cylinderMesh){
          list.push({mesh:cylinderMesh,type:'cylinder'});
        }
        if(gameState==='result'&&vrRetryMesh){
          vrRetryMesh.object3D.traverse(c=>{if(c.isMesh) list.push({mesh:c,type:'retry'});});
        }
        return list;
      }

      function handleHit(type, uv){
        if(type==='start'){ doStart(); }
        else if(type==='cylinder'){
          if(!uv) return;
          const u=uv.x, v=1-uv.y;
          const cell=cellData.find(c=>u>=c.uMin&&u<c.uMax&&v>=c.vMin&&v<c.vMax);
          if(!cell) return;
          if(cell.index===targetIndex){ doFinish(); }
          else{
            errorCount++;
            hud.style.color='#ff4466';
            setTimeout(()=>{hud.style.color='#00ffcc';},200);
          }
        }
        else if(type==='retry'){ doRetry(); }
      }

      function fireRay(clientX, clientY){
        mouse.x=(clientX/window.innerWidth)*2-1;
        mouse.y=-(clientY/window.innerHeight)*2+1;
        rc.setFromCamera(mouse, camEl.getObject3D('camera'));
        const targets=getTargets();
        if(!targets.length) return;
        const hits=rc.intersectObjects(targets.map(t=>t.mesh), false);
        if(!hits.length) return;
        const t=targets.find(t=>t.mesh===hits[0].object);
        if(t) handleHit(t.type, hits[0].uv);
      }

      let downPos={x:0,y:0};
      window.addEventListener('mousedown', e=>{
        if(e.button!==0) return;
        downPos={x:e.clientX,y:e.clientY};
      });
      window.addEventListener('mouseup', e=>{
        if(e.button!==0) return;
        const dx=e.clientX-downPos.x, dy=e.clientY-downPos.y;
        if(Math.sqrt(dx*dx+dy*dy)>8) return;
        fireRay(e.clientX, e.clientY);
      });

      window.addEventListener('mousemove', e=>{
        mouse.x=(e.clientX/window.innerWidth)*2-1;
        mouse.y=-(e.clientY/window.innerHeight)*2+1;
        rc.setFromCamera(mouse, camEl.getObject3D('camera'));
        const t=getTargets();
        const h=rc.intersectObjects(t.map(x=>x.mesh),false);
        document.body.style.cursor=h.length?'pointer':'default';
      });

      // FIX 10: VR 控制器 triggerdown — 改用 a-frame raycaster component 的 intersections
      // 這是最可靠的方式，因為 laser-controls 內建 raycaster 已正確設定
      ['rHand','lHand'].forEach(id=>{
        const hand=document.getElementById(id);
        if(!hand) return;

        hand.addEventListener('triggerdown', ()=>{
          const raycasterComp=hand.components.raycaster;
          if(!raycasterComp) return;

          const intersections=raycasterComp.intersections;
          if(!intersections||!intersections.length) return;

          const inter=intersections[0];
          const hitMesh=inter.object;

          // 找到對應的 target
          const targets=getTargets();
          for(const t of targets){
            // 往上遍歷父層找 match
            let cur=hitMesh;
            while(cur){
              if(cur===t.mesh){
                handleHit(t.type, inter.uv);
                return;
              }
              cur=cur.parent;
            }
          }

          // FIX 11: cylinderMesh 不在 entity hierarchy，需要直接比對
          if(gameState==='playing'&&cylinderMesh){
            let cur=hitMesh;
            while(cur){
              if(cur===cylinderMesh){
                handleHit('cylinder', inter.uv);
                return;
              }
              cur=cur.parent;
            }
          }
        });
      });

      // 初始視角歸零
      setTimeout(()=>{
        const lc=camEl.components['look-controls'];
        if(lc){lc.yawObject.rotation.y=0;lc.pitchObject.rotation.x=0;}
      },0);
    });
    </script>
  </body>
</html>
