<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>圓弧 - 數據固定版</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene background="color: #DADADA" fog="type: linear; color: #DADADA; far: 25; near: 0">
      
      <a-entity camera position="0 1.6 0" look-controls></a-entity>
      
      <a-assets>
        <canvas id="canvasCurvedData" width="4096" height="1024"></canvas>
      </a-assets>

      <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#999" opacity="0.5" metalness="0.5"></a-plane>

      <a-curvedimage 
        src="#canvasCurvedData" 
        height="4" 
        radius="4.5" 
        theta-length="240" 
        rotation="0 210 0" 
        position="0 1.6 0"
        material="shader: standard; metalness: 0.6; roughness: 0.2;">
      </a-curvedimage>

<script>
        var canvas = document.getElementById(document.getElementsByTagName('canvas')[0].id);
        var ctx = canvas.getContext('2d');
        
        ctx.fillStyle = "#111111";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        const rows = 6;
        const cols = 15;
        
        // --- 修正：定義上下邊距，不讓字貼邊 ---
        const verticalPadding = 80; // 上下各留 80 像素
        const usableHeight = canvas.height - (verticalPadding * 2);
        const unitW = canvas.width / cols;
        const unitH = usableHeight / rows;

        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        for (let i = 0; i < rows; i++) {
          for (let j = 0; j < cols; j++) {
            let x = (j * unitW) + (unitW / 2);
            // y 座標加上 padding，讓整體內容往下移並縮小間距
            let y = (i * unitH) + (unitH / 2) + verticalPadding;
            
            let fixedVal = (0.88888 - (i * 0.001) - (j * 0.002)).toFixed(5);
            
            ctx.fillStyle = "#00FF00";
            ctx.font = "bold 32px Monospace";
            ctx.fillText("[" + fixedVal + "]", x, y - 12);
            
            ctx.fillStyle = "#666666"; 
            ctx.font = "16px Monospace";
            ctx.fillText("DATA_BLOCK_" + i + "_" + j, x, y + 20);
          }
        }
      </script>
    </a-scene>
  </body>
</html>
